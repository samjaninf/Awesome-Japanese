name: Markdown lint

# Checks Markdown formatting on pull requests. The homepage is generated from
# readme.md, so well-formed Markdown keeps the build correct.

on:
  pull_request:
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint Markdown
        run: npx -y markdownlint-cli2@0.22.1 "**/*.md" "!node_modules"
