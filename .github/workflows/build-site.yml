name: Build homepage

on:
  push:
    branches: [master]
    paths:
      - "readme.md"
      - "site/**"
      - "package.json"
      - ".github/workflows/build-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-homepage
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: node site/build.mjs
      - name: Commit generated homepage if changed
        run: |
          if [ -n "$(git status --porcelain index.html assets/home.css sitemap.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html assets/home.css sitemap.xml
            git commit -m "chore: rebuild homepage from readme [skip ci]"
            git push
          else
            echo "Homepage already up to date."
          fi
