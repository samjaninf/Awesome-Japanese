name: Deploy site

# Builds the themed homepage from master's readme.md using the theme + build
# tooling and the /tv/ app that live on the `homepage` branch, then deploys the
# whole site (homepage + /tv/) to GitHub Pages via the official artifact flow.
# master stays clean (learning material only); all website code lives on `homepage`.
# Requires: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"   # hourly, at :07 — regenerates the live TV schedule

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out master (content)
        uses: actions/checkout@v4
      - name: Check out homepage branch (theme + /tv/ app)
        uses: actions/checkout@v4
        with:
          ref: homepage
          path: .homepage
      - name: Stage website tooling from the homepage branch
        run: |
          cp -r .homepage/site .homepage/tv .homepage/package.json .homepage/package-lock.json .homepage/robots.txt .homepage/.nojekyll .
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: node site/build.mjs
      - name: Assemble site directory
        run: |
          mkdir -p _site
          cp -r index.html assets tv sitemap.xml robots.txt .nojekyll _site/
          for f in readme.md tv.md mobile.md; do [ -f "$f" ] && cp "$f" _site/; done
      - name: Generate live TV schedule
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .homepage/scripts/build-schedule.mjs --out _site/tv/schedule.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
